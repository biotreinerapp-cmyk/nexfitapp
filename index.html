  <style>
    /* Critical CSS to prevent white flash and provide premium splash */
    :root {
      color-scheme: dark;
    }

    html,
    body {
      background-color: #050505 !important;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    #initial-splash {
      position: fixed;
      inset: 0;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.4s ease-out;
    }

    .splash-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: rgba(34, 197, 94, 0.1);
      border-radius: 50%;
      filter: blur(100px);
      animation: splash-pulse 2s infinite ease-in-out;
    }

    @keyframes splash-pulse {

      0%,
      100% {
        opacity: 0.5;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    .splash-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      z-index: 1;
    }

    .splash-glass-box {
      position: relative;
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      box-sizing: border-box;
      animation: box-entry 0.6s ease-out forwards;
      opacity: 0;
      transform: scale(0.8);
    }

    .splash-glass-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    }

    @keyframes box-entry {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .splash-icon {
      width: 40px;
      height: 40px;
      color: #34d399;
      /* emerald-400 */
      filter: drop-shadow(0 0 10px #34d399);
      animation: icon-entry 0.8s ease-out forwards;
      opacity: 0;
      transform: translateY(10px) scale(0.5);
    }

    @keyframes icon-entry {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .loader-line {
      width: 128px;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      opacity: 0;
      animation: fade-in 0.5s ease-out 0.3s forwards;
    }

    .loader-line::after {
      content: '';
      position: absolute;
      left: -100%;
      top: 0;
      width: 100%;
      height: 100%;
      background: #22c55e;
      animation: line-load 1.5s infinite ease-in-out;
    }

    @keyframes fade-in {
      to {
        opacity: 1;
      }
    }

    @keyframes line-load {
      to {
        left: 100%;
      }
    }
  </style>
</head>

<body translate="no">
  <div id="initial-splash">
    <div class="splash-glow"></div>
    <div class="splash-container">
      <div class="splash-glass-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="splash-icon">
          <path d="M14.4 14.4 9.6 9.6" />
          <path
            d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z" />
          <path d="m21.5 21.5-1.4-1.4" />
          <path d="M3.9 3.9 2.5 2.5" />
          <path
            d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z" />
        </svg>
      </div>
      <div class="loader-line"></div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
