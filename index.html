<!doctype html>
<html lang="pt-BR" class="dark" translate="no">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nexfit" />
  <meta name="theme-color" content="#000000" />
  <meta name="google" content="notranslate" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/pwa-512x512.png" />
  <link rel="manifest" href="/manifest.json" />
  <title>Nexfit – Plataforma Inteligente de Bem-Estar</title>
  <meta name="description"
    content="Nexfit é uma plataforma inteligente de bem-estar com treinos, monitoramento e integração simulada de smartwatch." />
  <meta name="author" content="Nexfit" />
  <link rel="canonical" href="/" />

  <!-- Fonts (High-performance, minimal) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <meta property="og:title" content="Nexfit – Plataforma Inteligente de Bem-Estar" />
  <meta property="og:description"
    content="Acompanhe sua atividade do momento, treinos e progresso semanal em um ambiente Dark Mode premium." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@Lovable" />
  <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  <style>
    /* Critical CSS to prevent white flash and provide premium splash */
    :root {
      color-scheme: dark;
    }

    html,
    body {
      background-color: #050505 !important;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    #initial-splash {
      position: fixed;
      inset: 0;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.4s ease-out;
    }

    .splash-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: rgba(34, 197, 94, 0.15);
      border-radius: 50%;
      filter: blur(100px);
      animation: splash-pulse 2s infinite ease-in-out;
    }

    @keyframes splash-pulse {

      0%,
      100% {
        opacity: 0.5;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    .splash-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }

    .splash-logo {
      height: 80px;
      width: auto;
      opacity: 0;
      transform: scale(0.8);
      filter: blur(10px) drop-shadow(0 0 15px rgba(34, 197, 94, 0.3));
      animation: splash-entry 0.8s ease-out forwards;
    }

    @keyframes splash-entry {
      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0px) drop-shadow(0 0 15px rgba(34, 197, 94, 0.3));
      }
    }

    .splash-branding {
      margin-top: 24px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5em;
      color: rgba(34, 197, 94, 0.6);
      opacity: 0;
      animation: fade-in 0.5s ease-out 0.5s forwards;
    }

    @keyframes fade-in {
      to {
        opacity: 1;
      }
    }

    .loader-line {
      width: 96px;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      margin-top: 16px;
      overflow: hidden;
      position: relative;
      opacity: 0;
      animation: fade-in 0.5s ease-out 0.8s forwards;
    }

    .loader-line::after {
      content: '';
      position: absolute;
      left: -100%;
      width: 100%;
      height: 100%;
      background: #22c55e;
      animation: line-load 2s infinite ease-in-out;
    }

    @keyframes line-load {
      to {
        left: 100%;
      }
    }

    .splash-footer {
      position: absolute;
      bottom: 40px;
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>

<body translate="no">
  <div id="initial-splash">
    <div class="splash-glow"></div>
    <div class="splash-container">
      <img src="/nexfit-logo.png" class="splash-logo" alt="Nexfit" onerror="this.style.opacity='0'">
      <div class="splash-branding">Nexfit System</div>
      <div class="loader-line"></div>
    </div>
    <div class="splash-footer">Elite Performance Intelligence</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
